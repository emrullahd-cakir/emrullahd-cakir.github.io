<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Site temporarily offline</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #080d12;
      color: #f4f7f8;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(92vw, 560px);
      padding: 2rem;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      background: rgba(255,255,255,.045);
      box-shadow: 0 24px 80px rgba(0,0,0,.3);
    }
    p:first-child {
      margin: 0 0 .75rem;
      color: #c69143;
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 .75rem;
      font-size: clamp(2rem, 8vw, 4rem);
      line-height: .95;
      letter-spacing: -.05em;
    }
    p:last-child {
      margin: 0;
      color: rgba(244,247,248,.72);
      font-size: 1rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <p>Offline</p>
    <h1>Site temporarily unavailable.</h1>
    <p>This GitHub Pages site has been taken offline for now.</p>
  </main>
</body>
</html>
