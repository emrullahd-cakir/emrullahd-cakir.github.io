<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} {{ site.title_separator }} {% endif %}{{ site.name }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body>
    <header class="masthead">
      <div class="masthead__inner-wrap">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.name }}</a>
        <nav class="greedy-nav" aria-label="Primary navigation">
          {% for link in site.data.navigation.main %}
            <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
          {% endfor %}
        </nav>
      </div>
    </header>

    {{ content }}

    <div class="page__footer">
      <footer>
        <p>&copy; {{ 'now' | date: '%Y' }} {{ site.name }}.</p>
      </footer>
    </div>
  </body>
</html>
